<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우리 가족 정원 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Jua&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, update, remove, get }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  /* ════════════════════════════════════════════
     🔥 FIREBASE CONFIG — PASTE YOUR CONFIG HERE
     ════════════════════════════════════════════
     1. Go to https://console.firebase.google.com
     2. Create a project → "우리가족정원" (or any name)
     3. Click "Add app" → Web (</>)
     4. Copy the firebaseConfig object and replace below
     5. In console: Build → Realtime Database → Create database
        → Start in TEST MODE → Copy the database URL
     ════════════════════════════════════════════ */
 const firebaseConfig = {
    apiKey: "AIzaSyDKGfF4ziEzUlqEACTJ0bPmiYRcbn9vBtM",
    authDomain: "konnngs-dfd9d.firebaseapp.com",
    databaseURL: "https://konnngs-dfd9d-default-rtdb.firebaseio.com",
    projectId: "konnngs-dfd9d",
    storageBucket: "konnngs-dfd9d.firebasestorage.app",
    messagingSenderId: "954348230269",
    appId: "1:954348230269:web:0049423f4f20d0ee560314"
  };

  let app, db;
  let isFirebaseReady = false;

  try {
    app = initializeApp(firebaseConfig);
    db  = getDatabase(app);
    // Quick connection test
    const testRef = ref(db, '.info/connected');
    onValue(testRef, (snap) => {
      isFirebaseReady = snap.val() === true;
      window.__fbConnected = isFirebaseReady;
      updateConnectionBadge(isFirebaseReady);
    });
  } catch(e) {
    console.warn("Firebase not configured — running in localStorage fallback mode");
    window.__fbConnected = false;
    updateConnectionBadge(false);
  }

  function updateConnectionBadge(online) {
    const b = document.getElementById('conn-badge');
    if (!b) return;
    b.textContent = online ? '🟢 실시간 연결' : '🟡 오프라인 모드';
    b.style.background = online ? 'rgba(76,175,80,0.2)' : 'rgba(255,193,7,0.2)';
    b.style.color = online ? '#2e7d32' : '#f57f17';
  }

  /* ═══ FIREBASE API ═══ */
  window.fbSet    = (path, data) => db ? set(ref(db, path), data)      : Promise.resolve();
  window.fbPush   = (path, data) => db ? push(ref(db, path), data)     : Promise.resolve();
  window.fbUpdate = (path, data) => db ? update(ref(db, path), data)   : Promise.resolve();
  window.fbRemove = (path)       => db ? remove(ref(db, path))         : Promise.resolve();
  window.fbGet    = (path)       => db ? get(ref(db, path))            : Promise.resolve(null);

  window.fbListen = (path, cb) => {
    if (!db) return () => {};
    const r = ref(db, path);
    const unsub = onValue(r, snap => cb(snap.val()));
    return unsub;
  };
</script>

<style>
/* ════════════════════════════════════
   TOKENS & RESET
════════════════════════════════════ */
:root {
  --grass:      #7ec850;
  --grass-dark: #5a9e35;
  --grass-pale: #d4edba;
  --soil:       #c4955a;
  --soil-light: #e8c99a;

  --sky-deep:   #78c8f0;

  --petal-yel:  #ffe066;
  --petal-blue: #a8d8f0;

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior: smooth; }
body {

/* ════════════════════════════════════
   SCREEN SYSTEM
════════════════════════════════════ */
.screen { display: none; min-height: 100vh; }

/* ════════════════════════════════════
   CONNECTION BADGE
════════════════════════════════════ */
#conn-badge {
  position: fixed; top: 12px; right: 12px; z-index: 999;
  padding: 4px 12px; border-radius: 999px;
  font-size: 0.72rem; font-weight: 700; font-family: 'Nunito', sans-serif;

  backdrop-filter: blur(8px);

}

/* ════════════════════════════════════
   GARDEN HOME SCREEN
════════════════════════════════════ */
#home-screen {
  background:
    radial-gradient(ellipse 120% 50% at 50% 100%, #5a9e35 0%, transparent 60%),
    linear-gradient(180deg, #a8daf7 0%, #c8eeff 35%, #d4edba 65%, #7ec850 100%);
  align-items: center;
  justify-content: flex-start;
  padding-top: 0;
  position: relative;
  overflow: hidden;
}

/* Animated grass layer */
.grass-layer {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 180px;
  background: linear-gradient(180deg, transparent 0%, #5a9e35 40%, #3d7a22 100%);
  border-radius: 60% 60% 0 0 / 30px 30px 0 0;
}
.grass-blades {
  position: absolute; bottom: 140px; left: 0; right: 0;
  display: flex; justify-content: space-around; align-items: flex-end;
}
.blade {
  width: 8px; height: 32px;
  background: linear-gradient(180deg, #7ec850 0%, #5a9e35 100%);
  border-radius: 4px 4px 2px 2px;
  transform-origin: bottom center;
  animation: swayBlade 3s ease-in-out infinite;
}
.blade:nth-child(even) { animation-delay: 0.5s; height: 24px; }
.blade:nth-child(3n) { animation-delay: 1s; height: 40px; }
@keyframes swayBlade {
  0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)}
}

/* Floating clouds */
.cloud {
  position: absolute;
  background: rgba(255,255,255,0.85);
  border-radius: 50px;
  filter: blur(2px);
  animation: driftCloud linear infinite;
}
.cloud::before, .cloud::after {
  content:''; position:absolute;
  background: inherit; border-radius: 50%;
}
@keyframes driftCloud {
  from{transform:translateX(-120%)} to{transform:translateX(110vw)}
}

/* Sun */
.sun {
  position: absolute; top: 40px; right: 80px;
  width: 72px; height: 72px;
  background: radial-gradient(circle, #ffe066 40%, #ffcc00 70%, transparent 100%);
  border-radius: 50%;
  box-shadow: 0 0 40px 10px rgba(255,220,50,0.4);
  animation: sunPulse 4s ease-in-out infinite;
}
@keyframes sunPulse {
  0%,100%{box-shadow:0 0 40px 10px rgba(255,220,50,0.4)}
  50%{box-shadow:0 0 60px 20px rgba(255,220,50,0.6)}
}

/* Title area */
.garden-title-wrap {
  position: relative; z-index: 10;
  text-align: center;
  padding: 60px 20px 0;
  width: 100%;
}
.garden-title {
  font-family: 'Jua', sans-serif;
  font-size: clamp(2.2rem, 8vw, 3.8rem);
  color: #fff;
  text-shadow:
    0 3px 0 var(--grass-dark),
    0 6px 16px rgba(0,0,0,0.2);

  margin-bottom: 6px;
}
.garden-subtitle {

}

/* Profile cards */
.profile-row {

  padding-bottom: 180px;

.plot-card {

.plot-card.junsu:hover { box-shadow: 0 20px 48px rgba(255,152,0,0.3); }

.plot-icon { font-size: 52px; display: block; margin-bottom: 8px;

.plot-card.junsu .plot-name  { color: #bf360c; }

/* Decorative flowers on home */

  position: absolute; bottom: 0; left: 0; right: 0; height: 120px;

}
.kj-lego-brick {

}
.kj-lego-brick::before, .kj-lego-brick::after {

  width: 10px; height: 6px; background: #ef9a9a;
  border-radius: 50% 50% 0 0; top: -5px;
}
.kj-lego-brick::before { left: 5px; }
.kj-lego-brick::after  { left: 21px; }
@keyframes legoBounce {

}
.kj-car {
  position: absolute; font-size: 40px;
  animation: raceCar 8s linear infinite;
  bottom: 80px;
}
@keyframes raceCar {
  from{left:-60px} to{left:110vw}
}

/* Junho: floating clouds & plushies */
.jh-cloud-deco {
  position: absolute; background: rgba(255,255,255,0.7);
  border-radius: 50px; filter: blur(1px);
  animation: jCloudDrift linear infinite;
}
.jh-cloud-deco::before {
  content:''; position:absolute; width:60%; height:140%;
  background: inherit; border-radius:50%; top:-40%; left:20%;
}
@keyframes jCloudDrift {
  from{transform:translateX(-120px)} to{transform:translateX(110vw)}
}
.jh-plush {
  position: absolute; font-size: 38px;
  animation: plushBounce 3s ease-in-out infinite;
}
@keyframes plushBounce {
  0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-12px) rotate(5deg)}
}

/* Junsu: burrow holes & seeds */
.js-burrow {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(ellipse, #4e342e 0%, #3e2723 80%, transparent 100%);
  animation: burrowPulse 3s ease-in-out infinite;
}
@keyframes burrowPulse {
  0%,100%{transform:scale(1) scaleY(0.4)} 50%{transform:scale(1.05) scaleY(0.45)}
}
.js-hamster {
  position: absolute; font-size: 42px;
  animation: hamsterPeek 4s ease-in-out infinite;
  transform-origin: bottom center;
}
@keyframes hamsterPeek {
  0%,100%{transform:translateY(10px) scale(0.85)} 30%,70%{transform:translateY(0) scale(1)}
}
.js-seed {
  position: absolute; font-size: 20px;
  animation: seedFloat 5s ease-in-out infinite;
}
@keyframes seedFloat {
  0%,100%{transform:rotate(-15deg) translateY(0)} 50%{transform:rotate(15deg) translateY(-10px)}

}

.nav-left { display:flex; align-items:center; gap:10px; }

  color: var(--t-title); border-radius: 999px;

}

  transition: all 0.2s; white-space: nowrap;
}

  opacity: 1; border-color: transparent;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
}
.tab-btn:hover:not(.active) { opacity: 0.9; transform: scale(1.04); }

/* ════ PANEL ════ */
.panel { display: none; }
.panel.active { display: block; }

/* ════ MAIN CONTENT ════ */

  max-width: 900px; margin: 0 auto;
  padding: 20px 16px 80px;
  position: relative; z-index: 5;
  flex: 1;
}

  background: var(--t-card);
  border: 2px solid var(--t-border);
  border-radius: 24px; padding: 20px;
  margin-bottom: 18px;
  backdrop-filter: blur(12px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
}

  font-family: 'Jua', sans-serif;

  background: var(--t-btn); color: var(--t-btnTxt);

  width: 100%; padding: 11px 16px;
  border-radius: 14px;
  border: 2px solid var(--t-border);
  background: rgba(255,255,255,0.85);

  transition: border-color 0.2s;
}
.g-input:focus, .g-select:focus, .g-textarea:focus { border-color: var(--t-primary); }
.g-textarea { min-height: 100px; resize: vertical; font-family: 'Gaegu', cursive; font-size: 1.05rem; }

/* ════ WELCOME BANNER ════ */
.welcome-banner {
  position: relative; overflow: hidden;
  border-radius: 28px; padding: 28px 24px;
  margin-bottom: 18px;
  background: var(--t-card);
  border: 2px solid var(--t-border);
  text-align: center;
}
.welcome-hero { font-size: 64px; display: block; margin-bottom: 6px;
  animation: plotFloat 3s ease-in-out infinite; }
.welcome-title {
  font-family: 'Jua', sans-serif;
  font-size: clamp(1.4rem, 4vw, 2rem);
  color: var(--t-title); margin-bottom: 4px;
}
.welcome-sub { font-family: 'Gaegu', cursive; font-size: 1.05rem; color: var(--t-sub); opacity: 0.85; }

/* ════ TODO ════ */
.todo-list { list-style: none; }
.todo-item {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 14px; border-radius: 16px;
  margin-bottom: 10px;
  background: rgba(255,255,255,0.35);
  border: 1.5px solid rgba(255,255,255,0.5);
  transition: all 0.3s;

  width: 30px; height: 30px; border-radius: 50%;
  border: 3px solid var(--t-primary);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.25s; flex-shrink: 0;
}
.check-btn.done {
  background: var(--t-primary); border-color: var(--t-primary);
}
.check-btn:hover { transform: scale(1.15); }
.todo-text { flex: 1; font-size: 0.95rem; font-weight: 600; color: var(--t-text); }
body.theme-kyeongjun .todo-text { color: #fff; }
.del-btn {
  background: rgba(220,50,50,0.1); border: none; border-radius: 8px;
  padding: 3px 9px; cursor: pointer; font-size: 0.75rem;
  color: #e53935; font-weight: 700; transition: all 0.2s;
}
.del-btn:hover { background: #e53935; color: #fff; }
.todo-empty { text-align: center; padding: 28px; opacity: 0.5; font-size: 0.95rem; color: var(--t-sub); }

/* ════ GARDEN / STICKER FLOWER BED ════ */
.flower-bed {
  min-height: 160px;
  background:
    radial-gradient(ellipse 80% 40% at 50% 100%, rgba(90,158,53,0.3) 0%, transparent 60%),
    linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(100,180,60,0.08) 100%);
  border-radius: 20px;
  border: 2px dashed rgba(100,180,60,0.3);
  padding: 20px 16px;
  position: relative;
}
.flower-grid {
  display: flex; flex-wrap: wrap; gap: 16px;
  align-items: flex-end;
}
.flower-item {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  animation: flowerBloom 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes flowerBloom {
  from{transform:scale(0) rotate(-30deg);opacity:0}
  to{transform:scale(1) rotate(0);opacity:1}
}
.flower-emoji { font-size: 40px; line-height: 1; }
.flower-date {
  font-size: 0.6rem; font-weight: 700; text-align: center;
  opacity: 0.65; font-family: 'Nunito', sans-serif; line-height: 1.3;
  color: var(--t-sub);
}
.bed-empty {
  position: absolute; inset: 0; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; opacity: 0.45;
}
.bed-empty-icon { font-size: 40px; }
.bed-empty-text { font-family: 'Gaegu', cursive; font-size: 1rem; color: var(--t-sub); }

/* Sticker progress */
.sticker-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.sticker-count {
  font-family: 'Jua', sans-serif; font-size: 2rem; color: var(--t-primary);
}
body.theme-kyeongjun .sticker-count { color: #ffeb3b; }
.progress-track {
  height: 12px; background: rgba(0,0,0,0.08); border-radius: 999px; overflow: hidden;
  margin-bottom: 6px;
}
body.theme-kyeongjun .progress-track { background: rgba(255,255,255,0.1); }
.progress-bar {
  height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--t-primary), var(--t-accent));
  transition: width 0.9s cubic-bezier(0.34,1.56,0.64,1);
}
.progress-hint {
  font-size: 0.8rem; font-weight: 700; opacity: 0.65; color: var(--t-sub);
}

/* Milestone badge */
.milestone-badge {
  background: linear-gradient(135deg, #ffd700, #ff9800);
  color: #5a2000; border-radius: 16px; padding: 14px 18px;
  font-weight: 800; font-size: 1rem; text-align: center;
  margin-bottom: 16px; line-height: 1.5;
  box-shadow: 0 4px 20px rgba(255,150,0,0.4);
  animation: milestoneGlow 1.8s ease-in-out infinite;
}
@keyframes milestoneGlow {
  0%,100%{box-shadow:0 4px 20px rgba(255,150,0,0.35)}
  50%{box-shadow:0 6px 36px rgba(255,150,0,0.65)}
}

/* ════ DIARY ════ */
.diary-entry {
  background: rgba(255,255,255,0.5);
  border: 1.5px solid var(--t-border);
  border-radius: 16px; padding: 14px 18px; margin-bottom: 12px;
}
body.theme-kyeongjun .diary-entry { background: rgba(255,255,255,0.07); }
.diary-date { font-size: 0.75rem; font-weight: 700; opacity: 0.6; margin-bottom: 5px; }
.diary-body { font-family: 'Gaegu', cursive; font-size: 1.05rem; line-height: 1.9; color: var(--t-text); }
body.theme-kyeongjun .diary-body { color: #ffcdd2; }

/* ════ CALENDAR ════ */
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
  margin-bottom: 16px;
}
.cal-day-label {
  text-align: center; font-size: 0.72rem; font-weight: 700;
  opacity: 0.5; padding: 4px 0; color: var(--t-text);
}
.cal-cell {
  aspect-ratio: 1; border-radius: 10px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 1px; position: relative;
  background: rgba(255,255,255,0.2); border: 1.5px solid transparent;
  transition: all 0.2s; cursor: default;
}
.cal-cell.today { border-color: var(--t-primary); }
.cal-cell.has-activity { background: rgba(76,175,80,0.15); }
.cal-num { font-size: 0.72rem; font-weight: 700; color: var(--t-text); opacity: 0.8; }
.cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 28px; }
.cal-dot { width: 5px; height: 5px; border-radius: 50%; }

/* ════ ADMIN PANEL ════ */
.admin-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 16px;
}
.admin-kid-card {
  background: var(--t-card); border: 2px solid var(--t-border);
  border-radius: 20px; padding: 18px;
  backdrop-filter: blur(10px);
}
.admin-kid-title {
  font-family: 'Jua', sans-serif; font-size: 1.1rem; color: var(--t-title);
  margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.admin-stat-row {
  display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
}
.stat-pill {
  background: rgba(255,255,255,0.4); border-radius: 999px;
  padding: 3px 12px; font-size: 0.78rem; font-weight: 700;
  color: var(--t-text); border: 1px solid rgba(255,255,255,0.5);
}

/* ════ OVERVIEW CARDS ════ */
.overview-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px;
  margin-bottom: 18px;
}
.overview-card {
  border-radius: 20px; padding: 16px 14px;
  background: rgba(255,255,255,0.6);
  border: 2px solid rgba(255,255,255,0.7);
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.overview-icon { font-size: 28px; margin-bottom: 6px; }
.overview-name { font-family: 'Jua', sans-serif; font-size: 1rem; margin-bottom: 8px; }

/* ════ CELEBRATION ════ */
.cel-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity 0.3s;
}
.cel-overlay.show { opacity: 1; pointer-events: all; }
.cel-box {
  background: linear-gradient(135deg, #fff9f0, #fffef8);
  border-radius: 32px; padding: 44px 36px;
  text-align: center; max-width: 360px; width: 90%;
  box-shadow: 0 20px 80px rgba(0,0,0,0.25);
  transform: scale(0.8);
  transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.cel-overlay.show .cel-box { transform: scale(1); }
.cel-emoji { font-size: 72px; display: block; margin-bottom: 12px; }
.cel-title { font-family: 'Jua', sans-serif; font-size: 1.8rem; color: #333; margin-bottom: 6px; }
.cel-msg { color: #777; font-size: 0.95rem; margin-bottom: 22px; }

/* ════ FLOWER BLOOM PARTICLE ════ */
.bloom-particle {
  position: fixed; z-index: 9998; pointer-events: none; font-size: 24px;
  animation: bloomFly 1.2s ease-out forwards;
}
@keyframes bloomFly {
  0%   { transform: translate(0,0) scale(0.5) rotate(0deg); opacity: 1; }
  100% { transform: translate(var(--dx), var(--dy)) scale(1.4) rotate(var(--dr)); opacity: 0; }
}

/* ════ CONFETTI ════ */
.confetti {
  position: fixed; z-index: 10000; pointer-events: none;
  border-radius: 2px;
  animation: confettiFall var(--dur, 2.5s) ease-in forwards;
}
@keyframes confettiFall {
  0%  { transform: translateY(-10px) rotate(0deg); opacity: 1; }
  100%{ transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ════ SYNC INDICATOR ════ */
.sync-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: #4caf50; animation: syncPulse 1.5s ease-in-out infinite;
}
@keyframes syncPulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

/* ════ RESPONSIVE ════ */
@media(max-width:600px){
  .content-wrap { padding: 14px 12px 70px; }
  .admin-row { grid-template-columns: 1fr; }
}

/* ════ ANIMATIONS ════ */
.fade-up { animation: fadeUp 0.5s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>

<script>
/* ════════════════════════════════════════════
   CONFIG
════════════════════════════════════════════ */
const USERS = {
  admin: {
    name:'누나', avatar:'👑', theme:'admin',
    welcomeTitle:'어서 와, 누나! 🌿', welcomeSub:'오늘도 동생들의 정원을 돌봐요',
    flower:'🌟', decoFn: renderAdminDeco,
  },
  kyeongjun: {
    name:'경준', avatar:'🏎️', theme:'kyeongjun',
    welcomeTitle:'안녕, 경준 레이서! 🏁', welcomeSub:'오늘도 풀 스로틀! VROOM 🔴',
    flower:'🏎️', decoFn: renderKJDeco,
  },
  junho: {
    name:'준호', avatar:'🧸', theme:'junho',
    welcomeTitle:'안녕, 준호! ☁️', welcomeSub:'포근하고 행복한 하루 보내요 🧸',
    flower:'🐻', decoFn: renderJHDeco,
  },
  junsu: {
    name:'준수', avatar:'🐹', theme:'junsu',
    welcomeTitle:'안녕, 준수! 🌻', welcomeSub:'햄찌처럼 빠릿빠릿하게! 🌰',
    flower:'🐹', decoFn: renderJSDeco,
  },
};

const BROTHERS = ['kyeongjun','junho','junsu'];
const BCOLORS  = { kyeongjun:'#e53935', junho:'#29b6f6', junsu:'#ffa726' };

let currentUser   = null;
let fbListeners   = [];   
let adminLoaded   = false; // 💡 어드민 화면 중복 렌더링 방지용 스위치!

/* ════════════════════════════════════════════
   LOCAL STORAGE FALLBACK & FIREBASE
════════════════════════════════════════════ */
function lsGet(k)    { try{ return JSON.parse(localStorage.getItem(k)); }catch{ return null; } }
function lsSet(k,v)  { try{ localStorage.setItem(k, JSON.stringify(v)); }catch{} }

async function dbSet(path, data) {
  if (window.fbSet) { try { await window.fbSet(path, data); return; } catch{} }
  lsSet(path.replace(/\//g,'_'), data);
}
async function dbPush(path, data) {
  if (window.fbPush) { try { const r = await window.fbPush(path, data); return r?.key; } catch{} }
  const key = Date.now().toString();
  const existing = lsGet(path.replace(/\//g,'_')) || {};
  existing[key] = data;
  lsSet(path.replace(/\//g,'_'), existing);
  return key;
}
async function dbRemove(path) {
  if (window.fbRemove) { try { await window.fbRemove(path); return; } catch{} }
  lsSet(path.replace(/\//g,'_'), null);
}
function dbListen(path, cb) {
  if (window.fbListen) {
    return window.fbListen(path, val => cb(val || {}));
  }
  const id = setInterval(() => cb(lsGet(path.replace(/\//g,'_')) || {}), 1500);
  cb(lsGet(path.replace(/\//g,'_')) || {});
  return () => clearInterval(id);
}

/* ════════════════════════════════════════════
   NAVIGATION & LISTENERS
════════════════════════════════════════════ */
function goHome() {
  fbListeners.forEach(u => { if(typeof u === 'function') u(); });
  fbListeners = [];
  adminLoaded = false; // 홈으로 가면 스위치 초기화
  currentUser = null;
  document.body.className = '';
  document.getElementById('home-screen').classList.add('active');
  document.getElementById('user-screen').classList.remove('active');
}

function goToUser(uid) {
  currentUser = uid;
  const u = USERS[uid];
  document.getElementById('home-screen').classList.remove('active');
  document.getElementById('user-screen').classList.add('active');
  document.body.className = `theme-${u.theme}`;

  document.getElementById('nav-avatar').textContent = u.avatar;
  document.getElementById('nav-name').textContent   = u.name;
  document.getElementById('welcome-emoji').textContent = u.avatar;
  document.getElementById('welcome-title').textContent = u.welcomeTitle;
  document.getElementById('welcome-sub').textContent   = u.welcomeSub;

  u.decoFn();

  const adminOnly = document.querySelector('.admin-only');
  if (adminOnly) adminOnly.style.display = uid === 'admin' ? 'block' : 'none';
  const brotherTabs = ['todo-tab','diary-tab','sticker-tab','cal-tab'];
  brotherTabs.forEach(t => {
    const btn = document.querySelector(`[data-tab="${t}"]`);
    if (btn) btn.style.display = uid === 'admin' ? 'none' : '';
  });
  const homeBtn = document.querySelector('[data-tab="home-tab"]');
  if (homeBtn) homeBtn.textContent = uid === 'admin' ? '📊 현황' : '🏠 홈';

  const ab = document.getElementById('award-btn');
  if (ab) ab.style.display = uid === 'admin' ? 'none' : 'block';

  switchTab(uid === 'admin' ? 'admin-tab' : 'home-tab');
  attachListeners(uid);
}

function attachListeners(uid) {
  fbListeners.forEach(u => { if(typeof u==='function') u(); });
  fbListeners = [];

  if (uid === 'admin') {
    renderAdminOverview();
    // 여기서 renderAdminPanel()을 부르던 것을 삭제! (switchTab에서 알아서 부름)
  } else {
    const u1 = dbListen(`todos/${uid}`,    v => renderTodos(v));
    const u2 = dbListen(`stickers/${uid}`, v => renderFlowerBed(v));
    const u3 = dbListen(`diaries/${uid}`,  v => renderDiaries(v));
    fbListeners.push(u1, u2, u3);
    renderCalendar();
  }
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === tabId));
  
  if (tabId === 'home-tab')    renderHomeTab();
  if (tabId === 'cal-tab')     renderCalendar();
  if (tabId === 'admin-tab')   renderAdminPanel();
}

  }

  // 데이터 수신기도 중복으로 켜지지 않게 딱 한 번만 연결합니다.
  if (!adminLoaded) {
    BROTHERS.forEach(b => {
      const u2 = dbListen(`todos/${b}`, data => {

        el.innerHTML = `<ul class="todo-list">${

function renderTodos(data) {

    list.innerHTML = `<div class="todo-empty">🌱 아직 할일이 없어요! 잠깐 쉬어요.</div>`;

  list.innerHTML = todos.map(([key, t]) => `

      <button class="del-btn" onclick="deleteTodo('${key}','${currentUser}')">✕</button>

async function toggleTodo(key, uid, newDone) {
  await dbSet(`todos/${uid}/${key}/done`, newDone);
  if (newDone) {
    playSound(uid); bloomEffect(event);

function renderFlowerBed(data) {
  const stickers = data ? Object.entries(data) : [];
  const count = stickers.length;
  const pct = ((count % 10) / 10) * 100;

  if (document.getElementById('sticker-count')) document.getElementById('sticker-count').textContent = count;
  if (document.getElementById('sticker-left')) document.getElementById('sticker-left').textContent = Math.ceil((count + 0.1) / 10) * 10 - count;
  if (document.getElementById('sticker-prog')) document.getElementById('sticker-prog').style.width = pct + '%';

  const mWrap = document.getElementById('milestone-wrap');
  if (mWrap) mWrap.innerHTML = (count > 0 && count % 10 === 0) ? `<div class="milestone-badge">🎊 와! 꽃 ${count}개 달성! 정원 파티 상품을 받아요! 🎁🌈</div>` : '';

  const grid = document.getElementById('flower-grid');
  const empty = document.getElementById('bed-empty');
  if (!grid) return;

  if (count === 0) {
    grid.innerHTML = '';
    if (empty) empty.style.display = 'flex';
    return;
  }
  if (empty) empty.style.display = 'none';
  const flowers = FLOWER_MAP[currentUser] || ['🌸'];
  grid.innerHTML = stickers.map(([,s], i) => `<div class="flower-item" style="animation-delay:${Math.min(i,20)*0.05}s"><span class="flower-emoji">${flowers[i % flowers.length]}</span><span class="flower-date">Awarded:<br>${s.date}</span></div>`).join('');
}

function todayStr() { return new Date().toISOString().slice(0,10); }

async function renderCalendar() {
  const grid = document.getElementById('cal-grid');
  const legend = document.getElementById('cal-legend');
  const label = document.getElementById('cal-month-label');
  if (!grid) return;

  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  if (label) label.textContent = `${year}년 ${month+1}월`;

  const allActivity = {};
  for (const uid of [...BROTHERS, 'admin']) {
    const unsub = dbListen(`activity/${uid}`, data => { allActivity[uid] = data || {}; drawCalGrid(); });
    fbListeners.push(unsub);
  }

  function drawCalGrid() {
    const days = ['일','월','화','수','목','금','토'];
    let html = days.map(d => `<div class="cal-day-label">${d}</div>`).join('');
    for (let i = 0; i < firstDay; i++) html += `<div class="cal-cell"></div>`;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateStr === todayStr();
      const dotsHtml = BROTHERS.map(b => {
        if (!allActivity[b]?.[dateStr]) return '';
        return `<div class="cal-dot" style="background:${BCOLORS[b]}"></div>`;
      }).join('');
      html += `<div class="cal-cell ${isToday?'today':''} ${dotsHtml?'has-activity':''}"><span class="cal-num">${d}</span>${dotsHtml ? `<div class="cal-dots">${dotsHtml}</div>` : ''}</div>`;
    }
    grid.innerHTML = html;
  }
  drawCalGrid();

  if (legend) legend.innerHTML = BROTHERS.map(b => `<span style="display:flex;align-items:center;gap:5px;font-size:0.78rem;font-weight:700;color:var(--t-text);opacity:0.8"><span style="width:10px;height:10px;border-radius:50%;background:${BCOLORS[b]};display:inline-block"></span>${USERS[b].name}</span>`).join('');
}

let _ac; function getAC() { return _ac || (_ac = new (window.AudioContext||window.webkitAudioContext)()); }
function playSound(uid) { try { const ac = getAC(); if (uid==='kyeongjun') playVroom(ac); else if (uid==='junho') playSqueeze(ac); else if (uid==='junsu') playChu(ac); else playChime(ac); } catch(e) {} }
function playVroom(ac) { const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.type='sawtooth'; o.frequency.setValueAtTime(80,ac.currentTime); o.frequency.exponentialRampToValueAtTime(280,ac.currentTime+0.25); o.frequency.exponentialRampToValueAtTime(130,ac.currentTime+0.55); g.gain.setValueAtTime(0.28,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.6); o.start(); o.stop(ac.currentTime+0.6); }
function playSqueeze(ac) { const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.type='sine'; o.frequency.setValueAtTime(550,ac.currentTime); o.frequency.exponentialRampToValueAtTime(850,ac.currentTime+0.1); o.frequency.exponentialRampToValueAtTime(480,ac.currentTime+0.3); g.gain.setValueAtTime(0.18,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.35); o.start(); o.stop(ac.currentTime+0.4); }
function playChu(ac) { [0,0.08].forEach((d,i)=>{ const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.type='sine'; o.frequency.setValueAtTime(780+i*180,ac.currentTime+d); o.frequency.exponentialRampToValueAtTime(980+i*80,ac.currentTime+d+0.07); g.gain.setValueAtTime(0.13,ac.currentTime+d); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d+0.14); o.start(ac.currentTime+d); o.stop(ac.currentTime+d+0.18); }); }
function playChime(ac) { [523,659,784].forEach((f,i)=>{ const o=ac.createOscillator(),g=ac.createGain(); o.connect(g); g.connect(ac.destination); o.frequency.value=f; g.gain.setValueAtTime(0.13,ac.currentTime+i*0.1); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+i*0.1+0.4); o.start(ac.currentTime+i*0.1); o.stop(ac.currentTime+i*0.1+0.5); }); }

function bloomEffect(e) {
  const x = e?.clientX ?? window.innerWidth/2, y = e?.clientY ?? window.innerHeight/2;
  const flowers = FLOWER_MAP[currentUser] || ['🌸'];
  for (let i=0; i<8; i++) {
    const el = document.createElement('div'); el.className = 'bloom-particle'; el.textContent = flowers[i % flowers.length];
    el.style.left=x+'px'; el.style.top=y+'px';
    const a=(i/8)*Math.PI*2, d=60+Math.random()*60;
    el.style.setProperty('--dx', Math.cos(a)*d+'px'); el.style.setProperty('--dy', Math.sin(a)*d+'px'); el.style.setProperty('--dr', (Math.random()*360)+'deg');
    el.style.animationDelay=(i*0.04)+'s'; document.body.appendChild(el); setTimeout(()=>el.remove(), 1500);
  }
}

function showCel(emoji, title, msg) { document.getElementById('cel-emoji').textContent=emoji; document.getElementById('cel-title').textContent=title; document.getElementById('cel-msg').textContent=msg; document.getElementById('cel-overlay').classList.add('show'); }
function closeCel() { document.getElementById('cel-overlay').classList.remove('show'); }
function spawnConfetti(n=30) {
  const cols = ['#e53935','#ffd93d','#4caf50','#29b6f6','#ff9800','#f48fb1','#ab47bc'];
  for (let i=0;i<n;i++) setTimeout(()=>{
    const el=document.createElement('div'); el.className='confetti'; el.style.left=Math.random()*100+'vw'; el.style.top='-16px'; el.style.background=cols[Math.floor(Math.random()*cols.length)];
    el.style.width=(7+Math.random()*7)+'px'; el.style.height=(7+Math.random()*7)+'px'; el.style.borderRadius=Math.random()>.5?'50%':'2px'; el.style.setProperty('--dur', (1.4+Math.random()*1.4)+'s');
    document.body.appendChild(el); setTimeout(()=>el.remove(), 3000);
  }, i*55);
}

function initGrass() {
  const wrap = document.getElementById('grass-blades'); if (!wrap) return;
  for (let i=0;i<40;i++) { const b = document.createElement('div'); b.className = 'blade'; wrap.appendChild(b); }
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>'); }

async function seedIfEmpty() {
  if (lsGet('seeded_v2')) return;
  const seed = { kyeongjun: ['수학 숙제 하기 🔢','레고 정리하기 🧱','영어 단어 외우기 📖'], junho: ['책 읽기 20분 📚','방 청소하기 🧹','일기 쓰기 ✏️'], junsu: ['햄찌 밥 주기 🐹','운동 30분 🏃','숙제 끝내기 📝'] };
  for (const [uid, tasks] of Object.entries(seed)) for (const text of tasks) await dbPush(`todos/${uid}`, { text, done: false, created: Date.now() });
  lsSet('seeded_v2', true);
}

initGrass();
seedIfEmpty();
</script>
