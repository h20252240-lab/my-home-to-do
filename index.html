<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>우리 가족 서버 ⛏️</title>
<link href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, update, remove, get }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDKGfF4ziEzUlqEACTJ0bPmiYRcbn9vBtM",
    authDomain: "konnngs-dfd9d.firebaseapp.com",
    databaseURL: "https://konnngs-dfd9d-default-rtdb.firebaseio.com",
    projectId: "konnngs-dfd9d",
    storageBucket: "konnngs-dfd9d.firebasestorage.app",
    messagingSenderId: "954348230269",
    appId: "1:954348230269:web:0049423f4f20d0ee560314"
  };

  let app, db;
  let isFirebaseReady = false;

  try {
    app = initializeApp(firebaseConfig);
    db  = getDatabase(app);
    const testRef = ref(db, '.info/connected');
    onValue(testRef, (snap) => {
      isFirebaseReady = snap.val() === true;
      window.__fbConnected = isFirebaseReady;
      updateConnectionBadge(isFirebaseReady);
    });
  } catch(e) {
    console.warn("Firebase not configured — running in localStorage fallback mode");
    window.__fbConnected = false;
    updateConnectionBadge(false);
  }

  function updateConnectionBadge(online) {
    const b = document.getElementById('conn-badge');
    if (!b) return;
    b.textContent = online ? '🟢 서버 연결됨' : '🟡 오프라인 모드';
    b.style.background = online ? 'rgba(76,175,80,0.2)' : 'rgba(255,193,7,0.2)';
    b.style.color = online ? '#5E9D34' : '#f57f17';
  }

  window.fbSet    = (path, data) => db ? set(ref(db, path), data)      : Promise.resolve();
  window.fbPush   = (path, data) => db ? push(ref(db, path), data)     : Promise.resolve();
  window.fbUpdate = (path, data) => db ? update(ref(db, path), data)   : Promise.resolve();
  window.fbRemove = (path)       => db ? remove(ref(db, path))         : Promise.resolve();
  window.fbGet    = (path)       => db ? get(ref(db, path))            : Promise.resolve(null);

  window.fbListen = (path, cb) => {
    if (!db) return () => {};
    const r = ref(db, path);
    const unsub = onValue(r, snap => cb(snap.val()));
    return unsub;
  };
</script>

<style>
  :root {
    --mc-bg: #8b8b8b;
    --mc-ui: #c6c6c6;
    --mc-border-light: #ffffff;
    --mc-border-dark: #555555;
    --mc-text: #111111;
  }

  body {
    font-family: 'Galmuri11', sans-serif;
    background-color: var(--mc-bg);
    color: var(--mc-text);
    margin: 0; padding: 0;
    image-rendering: pixelated; 
    overflow-x: hidden; /* 파티클 화면 넘어감 방지 */
  }

  /* 화면 숨기고 보여주기 */
  #home-screen, #user-screen { display: none; }
  #home-screen.active, #user-screen.active { display: block; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* 연결 배지 */
  #conn-badge { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.5); padding: 5px 10px; color: white; z-index: 1000; font-size: 12px; border: 2px solid #555; }

  /* 🧱 시작 화면: 마크 인벤토리(그리드) UI 구현 */
  #home-screen { padding: 30px; display: flex; align-items: center; min-height: 100vh; box-sizing: border-box; }
  .mc-inventory-ui { 
    background-color: var(--mc-ui);
    border: 4px solid;
    border-color: var(--mc-border-light) var(--mc-border-dark) var(--mc-border-dark) var(--mc-border-light);
    width: 340px; margin: 0 auto; padding: 20px;
    position: relative; z-index: 10;
  }
  .mc-title-area { text-align: center; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold; }
  .mc-subtitle { font-size: 0.8rem; opacity: 0.6; }

  .mc-profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .mc-slot { 
    background-color: #8b8b8b; /* 인벤토리 슬롯 색 */
    border: 4px solid;
    border-color: #3B3B3B #ffffff #ffffff #3B3B3B; /* 마크 테두리 */
    padding: 10px 5px; text-align: center; cursor: pointer; transition: transform 0.1s;
  }
  .mc-slot:active { transform: scale(0.9); }
  .mc-pixel-face { font-size: 2.5rem; image-rendering: pixelated; } /* 픽셀 얼굴용 */
  .mc-label { font-size: 0.75rem; margin-top: 5px; color: white; text-shadow: 1px 1px 0 #000; }

  /* 네비게이션 & 탭 */
  #nav-bar { background-color: #1a1a1a; color: #fff; padding: 15px; border-bottom: 4px solid #4a4a4a; display: flex; align-items: center; justify-content: space-between; position: relative; z-index: 10; }
  .nav-tabs { display: flex; gap: 5px; padding: 10px; background: #555; overflow-x: auto; scrollbar-width: none; position: relative; z-index: 10; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  
  /* 콘텐츠 영역 */
  .content-wrap { max-width: 800px; margin: 0 auto; padding-bottom: 50px; position: relative; z-index: 10; }

  /* 마크 UI 스타일 (상자 느낌) */
  .card, .admin-kid-card {
    background-color: var(--mc-ui);
    border: 4px solid;
    border-color: var(--mc-border-light) var(--mc-border-dark) var(--mc-border-dark) var(--mc-border-light);
    padding: 16px; margin: 15px; box-shadow: 4px 4px 0px rgba(0,0,0,0.3);
  }
  .card-head { font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid var(--mc-border-dark); padding-bottom: 5px; }

  /* 마인크래프트식 버튼 */
  button, .btn, .tab-btn {
    font-family: 'Galmuri11', sans-serif; background-color: #7A7A7A; color: white;
    border: 4px solid; border-color: #AFAFAF #3B3B3B #3B3B3B #AFAFAF;
    padding: 8px 12px; cursor: pointer; text-shadow: 2px 2px 0px #3B3B3B; white-space: nowrap;
  }
  button:active, .btn:active, .tab-btn:active { border-color: #3B3B3B #AFAFAF #AFAFAF #3B3B3B; }
  .tab-btn.active { background-color: #5E9D34; border-color: #87C65D #315C16 #315C16 #87C65D; }

  /* 입력창 (마크 채팅창 느낌) */
  input, .g-input, textarea { font-family: 'Galmuri11', sans-serif; background-color: #000; color: #fff; border: 2px solid #a0a0a0; padding: 10px; width: 100%; box-sizing: border-box; outline: none; }
  textarea { resize: vertical; }

  /* 리스트 및 인벤토리(그리드) */
  .todo-list { list-style: none; padding: 0; margin: 0; }
  .todo-item { background-color: rgba(255,255,255,0.5); border: 2px solid #888; margin-bottom: 8px; padding: 8px; display: flex; align-items: center; gap: 10px; }
  .todo-item.done { opacity: 0.6; text-decoration: line-through; }
  .check-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; padding: 0; font-size: 14px; }
  .del-btn { background-color: #e53935; border-color: #ff5252 #b71c1c #b71c1c #ff5252; padding: 4px 8px; font-size: 12px; }
  .todo-text { flex: 1; font-size: 0.9rem; }
  
  #flower-grid { display: flex; flex-wrap: wrap; gap: 10px; padding: 10px 0; }
  /* 인벤토리 슬롯 형식의 아이템 */
  .flower-item { background-color: #8b8b8b; border: 4px solid; border-color: #3B3B3B #ffffff #ffffff #3B3B3B; padding: 10px; text-align: center; font-size: 2rem; width: 60px; display: flex; flex-direction: column; align-items: center; }

  /* 알림창(모달) */
  #cel-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); z-index: 9999; justify-content: center; align-items: center; }
  #cel-overlay.show { display: flex; }
  .cel-box { background: var(--mc-ui); border: 4px solid; border-color: var(--mc-border-light) var(--mc-border-dark) var(--mc-border-dark) var(--mc-border-light); padding: 30px; text-align: center; max-width: 300px; }
  
  /* 마크식 프로필 상단 영역 */
  #scene-bg { position: relative; height: 120px; overflow: hidden; border: 4px solid var(--mc-border-dark); margin: 15px; background: var(--mc-ui); z-index: 10;}
  
  /* 동물 픽셀 이미지 */
  .mc-pixelated-mobs { position: absolute; font-size: 4rem; bottom: 10px; right: 10px; image-rendering: pixelated; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
  
  /* 🎇 마크식 하얀 불꽃놀이 파티클 (새로 추가됨!) */
  .mc-spark {
    position: fixed;
    background-color: #ffffff; /* 하얀색 픽셀 */
    pointer-events: none;
    z-index: 5; /* 컨텐츠 뒤에서 터지게 설정 */
    box-shadow: 0 0 4px rgba(255,255,255,0.8);
    animation: fireworkBurst var(--dur) ease-out forwards;
  }
  @keyframes fireworkBurst {
    0% { transform: translate(0, 0) scale(1); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  /* 퀘스트 완료 시 통통 튀는 경험치/아이템 */
  @keyframes bloomParticle { 0% { transform: scale(1); } 50% { transform: scale(1.5) rotate(15deg); } 100% { transform: scale(1) rotate(0deg); } }
  .bloom-particle { font-size: 2rem; position: fixed; animation: bloomParticle 0.5s ease; pointer-events: none; z-index: 9998; text-shadow: 2px 2px 0 #000; }

  .cal-day-label { text-align: center; font-size: 0.8rem; font-weight: bold; padding: 5px 0; }
  .cal-cell { aspect-ratio: 1; border: 2px solid #888; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.3); }
  .cal-cell.today { border-color: #388e3c; background: rgba(76,175,80,0.3); font-weight: bold; }
</style>
</head>
<body>

<div id="conn-badge">🟡 연결 중...</div>

<div id="home-screen" class="screen active">
  <div class="mc-inventory-ui">
    <div class="mc-title-area">
      Minecraft Server<br>
      <span class="mc-subtitle">접속할 플레이어를 선택하세요</span>
    </div>
    
    <div class="mc-profile-grid">
      <div class="mc-slot" onclick="goToUser('admin')">
        <span class="mc-pixel-face">🐝</span>

      <div class="mc-slot" onclick="goToUser('kyeongjun')">

      <div class="mc-slot" onclick="goToUser('junho')">

      <div class="mc-slot" onclick="goToUser('junsu')">

      <div class="mc-slot"></div>
      <div class="mc-slot"></div>
      <div class="mc-slot"></div>
      <div class="mc-slot"></div>
      <div class="mc-slot"></div>

</div>

<div id="user-screen" class="screen">
  
  <div id="nav-bar">
    <div style="display:flex; align-items:center; gap:10px;">
      <span id="nav-avatar" style="font-size: 1.5rem;"></span>
      <span id="nav-name" style="font-size: 1.2rem; font-weight: bold;"></span>
    </div>

  </div>

  <div style="padding: 0 15px; position:relative; z-index:10;">
    <h2 id="welcome-title" style="margin: 0; font-size: 1.3rem;"></h2>

    <div id="home-tab" class="panel active">
      <div id="home-dynamic"></div>

    <div id="admin-tab" class="panel">

        <div class="card-head">🌿 서버 관리 콘솔</div>

<script>
const USERS = {
  admin: { name:'누나', avatar:'🐝', theme:'admin', welcomeTitle:'관리자 서버 접속 🌿', welcomeSub:'꿀벌 누나의 서버 감시 중...', flower:'🌻', decoFn: renderAdminDeco },
  kyeongjun: { name:'경준', avatar:'🐺', theme:'kyeongjun', welcomeTitle:'야생의 늑대 경준! 🌲', welcomeSub:'뼈다귀를 찾아 모험을 떠나자!', flower:'🦴', decoFn: renderKJDeco },
  junho: { name:'준호', avatar:'🐻‍❄️', theme:'junho', welcomeTitle:'빙하의 북극곰 준호! ❄️', welcomeSub:'신선한 생선을 낚아볼까?', flower:'🐟', decoFn: renderJHDeco },
  junsu: { name:'준수', avatar:'🐰', theme:'junsu', welcomeTitle:'초원의 토끼 준수! 🌾', welcomeSub:'당근 캐기 딱 좋은 날이네!', flower:'🥕', decoFn: renderJSDeco },
};

const BROTHERS = ['kyeongjun','junho','junsu'];
let currentUser = null;
let fbListeners = [];   
let adminLoaded = false;

function lsGet(k) { try{ return JSON.parse(localStorage.getItem(k)); }catch{ return null; } }
function lsSet(k,v) { try{ localStorage.setItem(k, JSON.stringify(v)); }catch{} }

async function dbSet(path, data) { if (window.fbSet) { try { await window.fbSet(path, data); return; } catch{} } lsSet(path.replace(/\//g,'_'), data); }
async function dbPush(path, data) { if (window.fbPush) { try { const r = await window.fbPush(path, data); return r?.key; } catch{} } const key = Date.now().toString(); const existing = lsGet(path.replace(/\//g,'_')) || {}; existing[key] = data; lsSet(path.replace(/\//g,'_'), existing); return key; }
async function dbRemove(path) { if (window.fbRemove) { try { await window.fbRemove(path); return; } catch{} } lsSet(path.replace(/\//g,'_'), null); }
function dbListen(path, cb) { if (window.fbListen) return window.fbListen(path, val => cb(val || {})); const id = setInterval(() => cb(lsGet(path.replace(/\//g,'_')) || {}), 1500); cb(lsGet(path.replace(/\//g,'_')) || {}); return () => clearInterval(id); }

async function cleanupTodos(uid, data) {
  const now = Date.now(); const DAY_MS = 24 * 60 * 60 * 1000;
  if (!data) return;
  Object.entries(data).forEach(([key, t]) => { if (t.done && t.completedAt && (now - t.completedAt > DAY_MS)) dbRemove(`todos/${uid}/${key}`); });
}

function goHome() {
  fbListeners.forEach(u => { if(typeof u === 'function') u(); }); fbListeners = []; adminLoaded = false; currentUser = null;
  document.body.className = '';
  document.getElementById('home-screen').classList.add('active');
  document.getElementById('user-screen').classList.remove('active');
}

function goToUser(uid) {
  currentUser = uid; const u = USERS[uid];
  document.getElementById('home-screen').classList.remove('active');
  document.getElementById('user-screen').classList.add('active');
  document.body.className = `theme-${u.theme}`;
  document.getElementById('nav-avatar').textContent = u.avatar; document.getElementById('nav-name').textContent = u.name;
  document.getElementById('welcome-title').textContent = u.welcomeTitle; document.getElementById('welcome-sub').textContent = u.welcomeSub;
  
  u.decoFn();

  const tabContainer = document.getElementById('tab-container');
  if (uid === 'admin') {
    tabContainer.innerHTML = `<button class="tab-btn active" data-tab="admin-tab" onclick="switchTab('admin-tab')">📊 서버 관리</button><button class="tab-btn" data-tab="cal-tab" onclick="switchTab('cal-tab')">📅 달력</button>`;
    switchTab('admin-tab');
  } else {
    tabContainer.innerHTML = `<button class="tab-btn active" data-tab="home-tab" onclick="switchTab('home-tab')">🏠 홈</button><button class="tab-btn" data-tab="todo-tab" onclick="switchTab('todo-tab')">📋 퀘스트</button><button class="tab-btn" data-tab="sticker-tab" onclick="switchTab('sticker-tab')">🎒 인벤토리</button><button class="tab-btn" data-tab="diary-tab" onclick="switchTab('diary-tab')">✏️ 기록장</button>`;
    switchTab('home-tab');
  }
  attachListeners(uid);
}

function attachListeners(uid) {
  fbListeners.forEach(u => { if(typeof u==='function') u(); }); fbListeners = [];
  if (uid === 'admin') { renderAdminPanel(); } 
  else {
    fbListeners.push( dbListen(`todos/${uid}`, v => { cleanupTodos(uid, v); renderTodos(v); }) );
    fbListeners.push( dbListen(`stickers/${uid}`, v => renderFlowerBed(v)) );
    fbListeners.push( dbListen(`diaries/${uid}`,  v => renderDiaries(v)) );
  }
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  document.querySelectorAll('.panel').forEach(p => { p.classList.remove('active'); if (p.id === tabId) p.classList.add('active'); });
  if (tabId === 'home-tab') renderHomeTab();
  if (tabId === 'admin-tab') renderAdminPanel();
  if (tabId === 'cal-tab') renderCalendar();
}

function renderAdminPanel() {
  const row = document.getElementById('admin-row'); if (!row) return;
  if (row.innerHTML.trim() === '') {
    row.innerHTML = BROTHERS.map(b => `
      <div class="admin-kid-card">
        <div class="card-head" style="font-size:1.1rem; border:none; padding:0;">${USERS[b].avatar} ${USERS[b].name} 관리</div>
        <div style="display:flex;gap:8px;margin:10px 0;">
          <input id="task-inp-${b}" class="g-input" placeholder="새로운 퀘스트 부여..." style="flex:1" onkeydown="if(event.key==='Enter')adminAddTask('${b}')">
          <button class="btn btn-sm" onclick="adminAddTask('${b}')">추가</button>
        </div>
        <div id="admin-todo-full-${b}"></div>
        <button class="btn btn-sm" style="margin-top:12px; width:100%; background-color:#5E9D34;" onclick="adminAwardFlower('${b}')">${USERS[b].flower} 특별 보상 지급</button>
      </div>`).join('');
  }
  if (!adminLoaded) {
    BROTHERS.forEach(b => {
      fbListeners.push(dbListen(`todos/${b}`, data => {
        const el = document.getElementById(`admin-todo-full-${b}`); if (!el) return;
        const todos = data ? Object.entries(data).sort((a,b)=>b[1].created - a[1].created) : [];
        if (todos.length === 0) { el.innerHTML = `<div style="font-size:0.9rem; color:#666;">퀘스트 없음</div>`; return; }
        el.innerHTML = `<ul class="todo-list">${todos.map(([key,t]) => `<li class="todo-item ${t.done?'done':''}" style="padding:6px 8px; margin-bottom:4px; font-size:0.85rem"><span>${t.done?'✅':'⬜'}</span><span class="todo-text">${escHtml(t.text)}</span><button class="del-btn" onclick="deleteTodo('${key}','${b}')">✕</button></li>`).join('')}</ul>`;
      }));
    });
    adminLoaded = true;
  }
}

async function adminAddTask(uid) {
  const inp = document.getElementById(`task-inp-${uid}`); if (!inp || !inp.value.trim()) return;
  await addTodo(uid, inp.value); inp.value = '';
}

function renderHomeTab() {
  const wrap = document.getElementById('home-dynamic'); if (!wrap) return;
  wrap.innerHTML = `
    <div class="card"><div class="card-head">🏆 서버 랭킹</div><div id="home-rank-snippet"></div></div>
    <div class="card"><div class="card-head">🎒 내 인벤토리</div><div id="home-sticker-snippet"></div></div>
    <div class="card"><div class="card-head">📋 남은 퀘스트</div><div id="home-todo-snippet"></div></div>
  `;

  const stickerCounts = {};
  BROTHERS.forEach(b => {
    fbListeners.push(dbListen(`stickers/${b}`, data => {
      stickerCounts[b] = data ? Object.keys(data).length : 0;
      const el = document.getElementById('home-rank-snippet'); if (!el) return;
      const sorted = Object.entries(stickerCounts).sort((x,y) => y[1] - x[1]);
      el.innerHTML = sorted.map(([kid, count], i) => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:2px solid var(--mc-border-dark); font-size:0.95rem"><span>${i===0?'💎':'🔹'.replace('🔹', i===1?'🥇':'🥈')} ${USERS[kid].avatar} ${USERS[kid].name}</span><span style="font-weight:bold;">${count}${USERS[kid].flower}</span></div>`).join('');
    }));
  });

  fbListeners.push(dbListen(`stickers/${currentUser}`, v => {
    const count = v ? Object.keys(v).length : 0;
    const el = document.getElementById('home-sticker-snippet');
    if (el) el.innerHTML = `<div style="font-size:1.5rem; font-weight:bold; text-align:center;">${USERS[currentUser].flower} x ${count}</div><div style="text-align:center; font-size:0.8rem; opacity:0.6">아이템 획득 완료!</div>`;
  }));
  
  fbListeners.push(dbListen(`todos/${currentUser}`, v => {
    const todos = v ? Object.entries(v) : []; const done = todos.filter(([,t])=>t.done).length;
    const el = document.getElementById('home-todo-snippet');
    if (el) {
      const recent = todos.slice(0,3).map(([key,t]) => `<li class="todo-item ${t.done?'done':''}" style="padding:10px"><button class="check-btn ${t.done?'done':''}" onclick="toggleTodo('${key}','${currentUser}',${!t.done})">${t.done?'✓':''}</button><span class="todo-text">${escHtml(t.text)}</span></li>`).join('');
      el.innerHTML = `<div style="font-weight:700;margin-bottom:8px">진척도: ${done}/${todos.length} 완료</div><ul class="todo-list">${recent || `<div style="color:#666;">퀘스트가 없습니다!</div>`}</ul>`;
    }
  }));
}

function renderTodos(data) {
  const list = document.getElementById('todo-list'); if (!list) return;
  const todos = data ? Object.entries(data).sort((a,b)=>a[1].done - b[1].done) : [];
  if (todos.length === 0) { list.innerHTML = `<div style="color:#666; padding:10px;">조용하네요...</div>`; return; }
  list.innerHTML = todos.map(([key, t]) => `<li class="todo-item ${t.done ? 'done' : ''}"><button class="check-btn ${t.done ? 'done' : ''}" onclick="toggleTodo('${key}','${currentUser}',${!t.done})">${t.done ? '✓' : ''}</button><span class="todo-text">${escHtml(t.text)}</span><button class="del-btn" onclick="deleteTodo('${key}','${currentUser}')">✕</button></li>`).join('');
}

async function addTodo(uid, text) { if (!text.trim()) return; await dbPush(`todos/${uid}`, { text: text.trim(), done: false, created: Date.now(), completedAt: null }); }
async function deleteTodo(key, uid) { await dbRemove(`todos/${uid}/${key}`); }

async function toggleTodo(key, uid, newDone) {
  const completedAt = newDone ? Date.now() : null;
  await dbSet(`todos/${uid}/${key}/done`, newDone); await dbSet(`todos/${uid}/${key}/completedAt`, completedAt);
  if (newDone) {
    playSound(uid); bloomEffect(event); showCel('✨', '경험치+', `퀘스트를 완료했습니다!`);
    const snap = await window.fbGet?.(`todos/${uid}`);
    const all = snap ? Object.values(snap.val() || {}) : Object.values(lsGet(`todos_${uid}`) || {});
    const doneCount = all.filter(t => t.done).length;
    if (doneCount > 0 && doneCount % 3 === 0) {
      await awardStickerSilent(uid);
      setTimeout(()=>showCel('🎁', '아이템 획득!', `3콤보 달성! ${USERS[uid].flower} 1개를 얻었습니다!`), 1500);
    }
  }
}

async function awardStickerSilent(uid) {
  const today = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'-').replace('.','');
  await dbPush(`stickers/${uid}`, { date: today, ts: Date.now() });
}

async function adminAwardFlower(uid) {
  await awardStickerSilent(uid); showCel('🎁', '관리자 보상!', `${USERS[uid].name}에게 ${USERS[uid].flower} 아이템을 지급했습니다!`);
}

function renderFlowerBed(data) {
  const grid = document.getElementById('flower-grid'); const countEl = document.getElementById('sticker-count'); if (!grid) return;
  const stickers = data ? Object.entries(data) : []; if (countEl) countEl.textContent = stickers.length;
  const myItem = USERS[currentUser].flower; 
  grid.innerHTML = stickers.map(([,s]) => `<div class="flower-item"><span class="flower-emoji" style="text-shadow: 2px 2px 0 rgba(0,0,0,0.5);">${myItem}</span><div style="font-size:0.65rem; color:#fff; margin-top:8px; font-weight:bold; text-shadow: 1px 1px 0 #000;">${s.date}</div></div>`).join('');
}

function renderDiaries(data) {
  const wrap = document.getElementById('diary-list'); if (!wrap) return;
  const entries = data ? Object.entries(data).sort((a,b) => b[1].ts - a[1].ts) : [];
  wrap.innerHTML = entries.map(([,d]) => `<div style="background:rgba(255,255,255,0.7); border:2px solid var(--mc-border-dark); padding:10px; margin-bottom:10px;"><div style="font-weight:bold; border-bottom:2px solid var(--mc-border-dark); padding-bottom:5px; margin-bottom:5px;">📅 ${d.date}</div><div>${escHtml(d.text)}</div></div>`).join('') || '<p style="color:#666;">기록이 없습니다.</p>';
}

async function saveDiary() {
  const inp = document.getElementById('diary-input'); if (!inp.value.trim()) return;
  const today = new Date().toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'});
  await dbPush(`diaries/${currentUser}`, { text: inp.value, date: today, ts: Date.now() });
  inp.value = ''; showCel('📓', '저장 완료!', '서버 로그에 기록되었습니다.');
}

async function renderCalendar() {
  const grid = document.getElementById('cal-grid'); if (!grid) return;
  const now = new Date(), year = now.getFullYear(), month = now.getMonth();
  const daysInMonth = new Date(year, month+1, 0).getDate(); const firstDay = new Date(year, month, 1).getDay();
  let html = ['일','월','화','수','목','금','토'].map(d => `<div class="cal-day-label">${d}</div>`).join('');
  for (let i=0; i<firstDay; i++) html += `<div class="cal-cell" style="border:none; background:transparent;"></div>`;
  for (let d=1; d<=daysInMonth; d++) {
    const isToday = d === now.getDate();
    html += `<div class="cal-cell ${isToday?'today':''}"><span class="cal-num">${d}</span></div>`;
  }
  grid.innerHTML = html;
}

function renderAdminDeco() { document.getElementById('scene-bg').innerHTML = `<div class="mc-pixelated-mobs">🐝🌻</div>`; }
function renderKJDeco() { document.getElementById('scene-bg').innerHTML = `<div class="mc-pixelated-mobs">🐺🌲</div>`; }
function renderJHDeco() { document.getElementById('scene-bg').innerHTML = `<div class="mc-pixelated-mobs">🐻‍❄️🧊</div>`; }
function renderJSDeco() { document.getElementById('scene-bg').innerHTML = `<div class="mc-pixelated-mobs">🐰🌾</div>`; }

function showCel(emoji, title, msg) { document.getElementById('cel-emoji').textContent=emoji; document.getElementById('cel-title').textContent=title; document.getElementById('cel-msg').textContent=msg; document.getElementById('cel-overlay').classList.add('show'); }
function closeCel() { document.getElementById('cel-overlay').classList.remove('show'); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function bloomEffect(e) {
  const x = e?.clientX ?? window.innerWidth/2, y = e?.clientY ?? window.innerHeight/2;
  const myItem = USERS[currentUser].flower;
  for (let i=0; i<6; i++) {
    const el = document.createElement('div'); el.className = 'bloom-particle'; el.textContent = myItem;
    el.style.left=x+'px'; el.style.top=y+'px';
    const a=(i/6)*Math.PI*2, d=40+Math.random()*40;
    el.style.setProperty('--dx', Math.cos(a)*d+'px'); el.style.setProperty('--dy', Math.sin(a)*d+'px'); el.style.setProperty('--dr', (Math.random()*360)+'deg');
    el.style.animationDelay=(i*0.04)+'s'; document.body.appendChild(el); setTimeout(()=>el.remove(), 1500);
  }
}

let _ac; function getAC() { return _ac || (_ac = new (window.AudioContext||window.webkitAudioContext)()); }
function playSound(uid) { 
  try { 
    const ac = getAC(); const o = ac.createOscillator(); const g = ac.createGain(); 
    o.connect(g); g.connect(ac.destination); 
    o.type = 'sine'; o.frequency.setValueAtTime(800 + (Math.random() * 400), ac.currentTime); 
    g.gain.setValueAtTime(0, ac.currentTime); g.gain.linearRampToValueAtTime(0.3, ac.currentTime + 0.02); g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
    o.start(ac.currentTime); o.stop(ac.currentTime + 0.3);
  } catch(e) {} 
}

/* 🎇 랜덤 하얀 픽셀 불꽃놀이 (파티클) 생성기 */
function spawnAmbientFireworks() {
  // 화면 중앙~위쪽에서 터지도록 위치 설정
  const x = 50 + Math.random() * (window.innerWidth - 100);
  const y = 50 + Math.random() * (window.innerHeight / 2);
  
  // 한 번에 10~15개의 하얀 네모가 팡 터짐
  const particleCount = 10 + Math.floor(Math.random() * 6);
  for (let i = 0; i < particleCount; i++) {
    const el = document.createElement('div');
    el.className = 'mc-spark';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    
    // 네모 픽셀 크기 (2px ~ 6px 랜덤)
    const size = 2 + Math.floor(Math.random() * 4);
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    
    // 폭발 각도 및 속도
    const angle = Math.random() * Math.PI * 2;
    const velocity = 30 + Math.random() * 80;
    el.style.setProperty('--tx', (Math.cos(angle) * velocity) + 'px');
    el.style.setProperty('--ty', (Math.sin(angle) * velocity) + 'px');
    el.style.setProperty('--dur', (0.8 + Math.random() * 0.5) + 's');
    
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500); // 애니메이션 끝나면 삭제
  }
}

// 1.5초마다 40% 확률로 화면에 불꽃놀이 팡팡 터뜨리기!
setInterval(() => {
  if (Math.random() > 0.6) spawnAmbientFireworks();
}, 1500);

goHome();
