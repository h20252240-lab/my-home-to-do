<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, update, remove, get }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  /* ════════════════════════════════════════════
     🔥 FIREBASE CONFIG — PASTE YOUR CONFIG HERE
     ════════════════════════════════════════════
     1. Go to https://console.firebase.google.com
     2. Create a project → "우리가족정원" (or any name)
     3. Click "Add app" → Web (</>)
     4. Copy the firebaseConfig object and replace below
     5. In console: Build → Realtime Database → Create database
        → Start in TEST MODE → Copy the database URL
     ════════════════════════════════════════════ */
 const firebaseConfig = {
    apiKey: "AIzaSyDKGfF4ziEzUlqEACTJ0bPmiYRcbn9vBtM",
    authDomain: "konnngs-dfd9d.firebaseapp.com",
    databaseURL: "https://konnngs-dfd9d-default-rtdb.firebaseio.com",
    projectId: "konnngs-dfd9d",
    storageBucket: "konnngs-dfd9d.firebasestorage.app",
    messagingSenderId: "954348230269",
    appId: "1:954348230269:web:0049423f4f20d0ee560314"
  };

  let app, db;
  let isFirebaseReady = false;

  try {
    app = initializeApp(firebaseConfig);
    db  = getDatabase(app);
    // Quick connection test
    const testRef = ref(db, '.info/connected');
    onValue(testRef, (snap) => {
      isFirebaseReady = snap.val() === true;
      window.__fbConnected = isFirebaseReady;
      updateConnectionBadge(isFirebaseReady);
    });
  } catch(e) {
    console.warn("Firebase not configured — running in localStorage fallback mode");
    window.__fbConnected = false;
    updateConnectionBadge(false);
  }

  function updateConnectionBadge(online) {
    const b = document.getElementById('conn-badge');
    if (!b) return;
    b.textContent = online ? '🟢 실시간 연결' : '🟡 오프라인 모드';
    b.style.background = online ? 'rgba(76,175,80,0.2)' : 'rgba(255,193,7,0.2)';
    b.style.color = online ? '#2e7d32' : '#f57f17';
  }

  /* ═══ FIREBASE API ═══ */
  window.fbSet    = (path, data) => db ? set(ref(db, path), data)      : Promise.resolve();
  window.fbPush   = (path, data) => db ? push(ref(db, path), data)     : Promise.resolve();
  window.fbUpdate = (path, data) => db ? update(ref(db, path), data)   : Promise.resolve();
  window.fbRemove = (path)       => db ? remove(ref(db, path))         : Promise.resolve();
  window.fbGet    = (path)       => db ? get(ref(db, path))            : Promise.resolve(null);

  window.fbListen = (path, cb) => {
    if (!db) return () => {};
    const r = ref(db, path);
    const unsub = onValue(r, snap => cb(snap.val()));
    return unsub;
  };
</script>

<script>
/* ════════════════════════════════════════════
   마인크래프트 CONFIG & ROLES ⛏️
════════════════════════════════════════════ */
const USERS = {
  admin: {
    name:'누나', avatar:'🐝', theme:'admin',
    welcomeTitle:'관리자 서버 접속 🌿', welcomeSub:'꿀벌 누나의 서버 감시 중...',
    flower:'🌻',
    decoFn: renderAdminDeco,
  },
  kyeongjun: {
    name:'경준', avatar:'🐺', theme:'kyeongjun',
    welcomeTitle:'야생의 늑대 경준! 🌲', welcomeSub:'뼈다귀를 찾아 모험을 떠나자!',
    flower:'🦴',
    decoFn: renderKJDeco,
  },
  junho: {
    name:'준호', avatar:'🐻‍❄️', theme:'junho',
    welcomeTitle:'빙하의 북극곰 준호! ❄️', welcomeSub:'신선한 생선을 낚아볼까?',
    flower:'🐟',
    decoFn: renderJHDeco,
  },
  junsu: {
    name:'준수', avatar:'🐰', theme:'junsu',
    welcomeTitle:'초원의 토끼 준수! 🌾', welcomeSub:'당근 캐기 딱 좋은 날이네!',
    flower:'🥕',
    decoFn: renderJSDeco,
  },
};

const BROTHERS = ['kyeongjun','junho','junsu'];

let currentUser   = null;
let fbListeners   = [];   
let adminLoaded   = false;

/* ════════════════════════════════════════════
   DATABASE HELPERS & AUTO CLEANUP
════════════════════════════════════════════ */
function lsGet(k)    { try{ return JSON.parse(localStorage.getItem(k)); }catch{ return null; } }
function lsSet(k,v)  { try{ localStorage.setItem(k, JSON.stringify(v)); }catch{} }

async function dbSet(path, data) {
  if (window.fbSet) { try { await window.fbSet(path, data); return; } catch{} }
  lsSet(path.replace(/\//g,'_'), data);
}
async function dbPush(path, data) {
  if (window.fbPush) { try { const r = await window.fbPush(path, data); return r?.key; } catch{} }
  const key = Date.now().toString();
  const existing = lsGet(path.replace(/\//g,'_')) || {};
  existing[key] = data;
  lsSet(path.replace(/\//g,'_'), existing);
  return key;
}
async function dbRemove(path) {
  if (window.fbRemove) { try { await window.fbRemove(path); return; } catch{} }
  lsSet(path.replace(/\//g,'_'), null);
}
function dbListen(path, cb) {
  if (window.fbListen) return window.fbListen(path, val => cb(val || {}));
  const id = setInterval(() => cb(lsGet(path.replace(/\//g,'_')) || {}), 1500);
  cb(lsGet(path.replace(/\//g,'_')) || {});
  return () => clearInterval(id);
}

async function cleanupTodos(uid, data) {
  const now = Date.now();
  const DAY_MS = 24 * 60 * 60 * 1000;
  if (!data) return;
  Object.entries(data).forEach(([key, t]) => {
    if (t.done && t.completedAt && (now - t.completedAt > DAY_MS)) {
      dbRemove(`todos/${uid}/${key}`);
    }
  });
}

/* ════════════════════════════════════════════
   NAVIGATION & STRICT SECURITY
════════════════════════════════════════════ */
function goHome() {
  fbListeners.forEach(u => { if(typeof u === 'function') u(); });
  fbListeners = [];
  adminLoaded = false;
  currentUser = null;
  document.body.className = '';
  document.getElementById('home-screen').classList.add('active');
  document.getElementById('user-screen').classList.remove('active');
}

function goToUser(uid) {
  currentUser = uid;
  const u = USERS[uid];
  document.getElementById('home-screen').classList.remove('active');
  document.getElementById('user-screen').classList.add('active');
  document.body.className = `theme-${u.theme}`;

  document.getElementById('nav-avatar').textContent = u.avatar;
  document.getElementById('nav-name').textContent   = u.name;
  document.getElementById('welcome-emoji').textContent = u.avatar;
  document.getElementById('welcome-title').textContent = u.welcomeTitle;
  document.getElementById('welcome-sub').textContent   = u.welcomeSub;

  u.decoFn();

  const tabContainer = document.querySelector('.nav-tabs');
  if (uid === 'admin') {
    tabContainer.innerHTML = `
      <button class="tab-btn active" data-tab="admin-tab" onclick="switchTab('admin-tab')">📊 서버 관리</button>
      <button class="tab-btn" data-tab="cal-tab" onclick="switchTab('cal-tab')">📅 달력</button>
    `;
    switchTab('admin-tab');
  } else {
    tabContainer.innerHTML = `
      <button class="tab-btn active" data-tab="home-tab" onclick="switchTab('home-tab')">🏠 홈</button>
      <button class="tab-btn" data-tab="todo-tab" onclick="switchTab('todo-tab')">📋 퀘스트</button>
      <button class="tab-btn" data-tab="sticker-tab" onclick="switchTab('sticker-tab')">🎒 인벤토리</button>
      <button class="tab-btn" data-tab="diary-tab" onclick="switchTab('diary-tab')">✏️ 기록장</button>
    `;
    switchTab('home-tab');
  }
  
  attachListeners(uid);
}

function attachListeners(uid) {
  fbListeners.forEach(u => { if(typeof u==='function') u(); });
  fbListeners = [];

  if (uid === 'admin') {
    renderAdminPanel();
  } else {
    const u1 = dbListen(`todos/${uid}`, v => { cleanupTodos(uid, v); renderTodos(v); });
    const u2 = dbListen(`stickers/${uid}`, v => renderFlowerBed(v));
    const u3 = dbListen(`diaries/${uid}`,  v => renderDiaries(v));
    fbListeners.push(u1, u2, u3);
  }
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tabId));
  document.querySelectorAll('.panel').forEach(p => {
    p.classList.remove('active');
    if (p.id === tabId) p.classList.add('active');
  });
  
  if (tabId === 'home-tab') renderHomeTab();
  if (tabId === 'admin-tab') renderAdminPanel();
}

/* ════════════════════════════════════════════
   ADMIN PANEL
════════════════════════════════════════════ */
function renderAdminPanel() {
  const row = document.getElementById('admin-row');
  if (!row) return;

  if (row.innerHTML.trim() === '') {
    row.innerHTML = BROTHERS.map(b => `
      <div class="admin-kid-card">
        <div class="admin-kid-title">${USERS[b].avatar} ${USERS[b].name} 관리</div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <input id="task-inp-${b}" class="g-input" placeholder="새로운 퀘스트 부여..." style="flex:1" onkeydown="if(event.key==='Enter')adminAddTask('${b}')">
          <button class="btn btn-sm" onclick="adminAddTask('${b}')">추가</button>
        </div>
        <div id="admin-todo-full-${b}" class="admin-todo-list-container"></div>
        <button class="btn btn-sm" style="margin-top:12px; width:100%; background-color:#5E9D34;" onclick="adminAwardFlower('${b}')">${USERS[b].flower} 특별 보상 지급</button>
      </div>`).join('');
  }

  if (!adminLoaded) {
    BROTHERS.forEach(b => {
      const u = dbListen(`todos/${b}`, data => {
        const el = document.getElementById(`admin-todo-full-${b}`);
        if (!el) return;
        const todos = data ? Object.entries(data).sort((a,b)=>b[1].created - a[1].created) : [];
        if (todos.length === 0) { el.innerHTML = `<div class="todo-empty">퀘스트 없음</div>`; return; }
        el.innerHTML = `<ul class="todo-list">${
          todos.map(([key,t]) => `
            <li class="todo-item ${t.done?'done':''}" style="padding:6px 8px; margin-bottom:4px; font-size:0.85rem">
              <span>${t.done?'✅':'⬜'}</span>
              <span class="todo-text">${escHtml(t.text)}</span>
              <button class="del-btn" onclick="deleteTodo('${key}','${b}')">✕</button>
            </li>`).join('')
        }</ul>`;
      });
      fbListeners.push(u);
    });
    adminLoaded = true;
  }
}

/* ════════════════════════════════════════════
   TODOS, REWARDS & STICKERS
════════════════════════════════════════════ */
function renderTodos(data) {
  const list = document.getElementById('todo-list');
  if (!list) return;
  const todos = data ? Object.entries(data).sort((a,b)=>a[1].done - b[1].done) : [];
  if (todos.length === 0) { list.innerHTML = `<div class="todo-empty">조용하네요...</div>`; return; }
  list.innerHTML = todos.map(([key, t]) => `
    <li class="todo-item ${t.done ? 'done' : ''}">
      <button class="check-btn ${t.done ? 'done' : ''}" onclick="toggleTodo('${key}','${currentUser}',${!t.done})">${t.done ? '✓' : ''}</button>
      <span class="todo-text">${escHtml(t.text)}</span>
      <button class="del-btn" onclick="deleteTodo('${key}','${currentUser}')">✕</button>
    </li>`).join('');
}

async function addTodo(uid, text) {
  if (!text.trim()) return;
  await dbPush(`todos/${uid}`, { text: text.trim(), done: false, created: Date.now(), completedAt: null });
}
async function deleteTodo(key, uid) { await dbRemove(`todos/${uid}/${key}`); }

async function toggleTodo(key, uid, newDone) {
  const completedAt = newDone ? Date.now() : null;
  await dbSet(`todos/${uid}/${key}/done`, newDone);
  await dbSet(`todos/${uid}/${key}/completedAt`, completedAt);

  if (newDone) {
    playSound(uid); bloomEffect(event);
    showCel('경험치+', '퀘스트 완료!', `잘했어요!`);
    
    const snap = await window.fbGet?.(`todos/${uid}`);
    const all = snap ? Object.values(snap.val() || {}) : Object.values(lsGet(`todos_${uid}`) || {});
    const doneCount = all.filter(t => t.done).length;
    
    if (doneCount > 0 && doneCount % 3 === 0) {
      await awardStickerSilent(uid);
      showCel('🎁', '아이템 획득!', `3콤보 달성! ${USERS[uid].flower} 1개를 얻었습니다!`);
    }
  }
}

async function awardStickerSilent(uid) {
  const today = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\. /g,'-').replace('.','');

}

async function adminAwardFlower(uid) {
  await awardStickerSilent(uid);

function renderAdminDeco() { document.getElementById('scene-bg').innerHTML = `<div style="font-size:50px; position:absolute; bottom:20px; right:20px;">🐝🌻</div>`; }

function showCel(emoji, title, msg) { document.getElementById('cel-emoji').textContent=emoji; document.getElementById('cel-title').textContent=title; document.getElementById('cel-msg').textContent=msg; document.getElementById('cel-overlay').classList.add('show'); }
function closeCel() { document.getElementById('cel-overlay').classList.remove('show'); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function bloomEffect(e) {
  const x = e?.clientX ?? window.innerWidth/2, y = e?.clientY ?? window.innerHeight/2;
  const myItem = USERS[currentUser].flower;
  for (let i=0; i<6; i++) {
    const el = document.createElement('div'); el.className = 'bloom-particle'; el.textContent = myItem;
    el.style.left=x+'px'; el.style.top=y+'px';
    const a=(i/6)*Math.PI*2, d=40+Math.random()*40;
    el.style.setProperty('--dx', Math.cos(a)*d+'px'); el.style.setProperty('--dy', Math.sin(a)*d+'px'); el.style.setProperty('--dr', (Math.random()*360)+'deg');
    el.style.animationDelay=(i*0.04)+'s'; document.body.appendChild(el); setTimeout(()=>el.remove(), 1500);
  }
}

// 💡 마크 경험치 구슬 사운드 (XP Orb Sound)
let _ac; function getAC() { return _ac || (_ac = new (window.AudioContext||window.webkitAudioContext)()); }
function playSound(uid) { 
  try { 
    const ac = getAC(); 
    const o = ac.createOscillator();
    const g = ac.createGain(); 
    o.connect(g); 
    g.connect(ac.destination); 
    
    // 마크 경험치 특유의 맑고 높은 '띠링' 소리 (사인파)
    o.type = 'sine'; 
    // 피치를 랜덤하게 조절해서 연달아 먹을 때 다르게 들리도록
    const pitch = 800 + (Math.random() * 400); 
    o.frequency.setValueAtTime(pitch, ac.currentTime); 
    
    // 소리가 튕기듯 짧게 나도록 볼륨(gain) 조절
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.3, ac.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
    
    o.start(ac.currentTime); 
    o.stop(ac.currentTime + 0.3);
  } catch(e) {
    console.log("오디오 재생 실패", e);
  } 
}
